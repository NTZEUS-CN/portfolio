<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>扫码浏览作品集</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#fafafa;font-family:sans-serif}
    .card{background:#fff;padding:48px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.06);text-align:center}
    h2{font-size:18px;color:#111;margin:0 0 4px}
    .sub{color:#888;font-size:13px;margin-bottom:24px}
    #qr{padding:16px;display:inline-block}
    .url{font-size:11px;color:#999;margin-top:16px;word-break:break-all}
    .tip{font-size:12px;color:#bbb;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h2>周荣志 · 建筑环境艺术设计</h2>
    <p class="sub">扫码浏览作品集</p>
    <div id="qr"></div>
    <p class="url" id="url"></p>
    <p class="tip">截图保存 · 分享至微信 / 小红书</p>
  </div>
  <script>
    var targetUrl = "'$url'";
    new QRCode(document.getElementById("qr"), {
      text: targetUrl,
      width: 240,
      height: 240,
      colorDark: "#111",
      colorLight: "#fff"
    });
    document.getElementById("url").textContent = targetUrl;
  </script>
</body>
</html>
